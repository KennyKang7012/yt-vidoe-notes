<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YT 深度閱讀儀表板</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23181c2f'/%3E%3Cpath d='M16 20h32v6H35v20h-6V26H16z' fill='%23ffffff'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <aside class="sidebar">
      <h1>YT 深度閱讀</h1>
      <input id="searchInput" type="search" placeholder="搜尋標題、摘要、標籤..." />
      <p id="noteCount"></p>
      <div id="tagFilters" class="tags"></div>
    </aside>
    <main class="main">
      <section id="listPanel" class="list-panel"></section>
      <article id="detailPanel" class="detail-panel">
        <h2>選擇一篇筆記</h2>
        <p>左側選擇卡片後會載入 Markdown 內容。</p>
      </article>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
